<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Picture Puzzles</title>
<style>
:root {
  --purple:#5B21B6; --purple-m:#7C3AED; --purple-l:#8B5CF6; --purple-pale:#EDE9FE;
  --text:#0F172A; --muted:#64748B; --border:#E2E8F0; --bg:#F8F7FF; --card:#fff;
  --radius:18px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow:0 4px 16px rgba(91,33,182,.1),0 1px 4px rgba(0,0,0,.06);
  --shadow-lg:0 12px 40px rgba(91,33,182,.18),0 4px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#F1EFFE;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(167,139,250,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 100%,rgba(236,72,153,.1) 0%,transparent 50%);
  background-attachment:fixed;
  color:var(--text);min-height:100vh;overflow-x:hidden;
}

/* ── Screens ── */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ── Header bar ── */
.top-bar{
  background:linear-gradient(135deg,#4C1D95,#6D28D9);
  padding:14px 16px;display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 16px rgba(76,29,149,.4);flex-shrink:0;
}
.back-btn{
  border:none;background:rgba(255,255,255,.15);color:#fff;
  border-radius:10px;padding:8px 14px;font-size:.82rem;font-weight:700;cursor:pointer;
  backdrop-filter:blur(4px);transition:background .15s;letter-spacing:.1px;
}
.back-btn:hover{background:rgba(255,255,255,.25);}
.top-bar-title{color:#fff;font-weight:800;font-size:1rem;flex:1;letter-spacing:-.2px;}
.top-bar-sub{color:rgba(255,255,255,.7);font-size:.75rem;font-weight:600;}

/* ── Scroll content ── */
.scroll{flex:1;overflow-y:auto;padding:18px 16px;}

/* ── Hero ── */
.hero{
  background:linear-gradient(140deg,#3B0764 0%,#5B21B6 45%,#7C3AED 75%,#A78BFA 100%);
  border-radius:24px;padding:32px 20px 28px;color:#fff;margin-bottom:24px;
  text-align:center;box-shadow:0 16px 48px rgba(91,33,182,.35),0 4px 12px rgba(0,0,0,.1);
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;
}
.hero::after{content:'🧩';position:absolute;right:-8px;bottom:-16px;
  font-size:7rem;opacity:.08;pointer-events:none;line-height:1;}
.hero h1{font-size:1.9rem;font-weight:900;margin-bottom:8px;letter-spacing:-.5px;
  text-shadow:0 2px 8px rgba(0,0,0,.2);}
.hero p{font-size:.85rem;opacity:.8;font-weight:500;line-height:1.5;}

/* ── Section label ── */
.section-label{
  font-size:.62rem;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:2px;margin:22px 0 10px;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}

/* ── Theme grid ── */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px;}
.theme-card{
  border-radius:20px;overflow:hidden;cursor:pointer;
  box-shadow:var(--shadow);
  transition:transform .2s cubic-bezier(.34,1.2,.64,1),box-shadow .2s;
  position:relative;border:3px solid transparent;aspect-ratio:1;
}
.theme-card:hover{transform:translateY(-3px) scale(1.01);box-shadow:var(--shadow-lg);}
.theme-card.selected{
  border-color:var(--purple-l);
  box-shadow:0 0 0 3px var(--purple-m),var(--shadow-lg);
}
.theme-card:active{transform:scale(.95);}
.theme-bg{position:absolute;inset:0;}
.theme-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:28px 10px 10px;
  background:linear-gradient(transparent,rgba(0,0,0,.72));
  color:#fff;font-weight:800;font-size:.88rem;letter-spacing:-.1px;
}
.theme-emoji{position:absolute;top:10px;left:10px;font-size:2.4rem;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));}
.theme-check{
  position:absolute;top:8px;right:8px;width:26px;height:26px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--purple-m),var(--purple-l));
  color:#fff;font-size:.8rem;
  display:none;align-items:center;justify-content:center;font-weight:900;
  box-shadow:0 2px 8px rgba(109,40,217,.5);
}
.theme-card.selected .theme-check{display:flex;}

/* ── Difficulty pills ── */
.diff-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.diff-pill{
  padding:11px 12px;border-radius:14px;border:2px solid var(--border);
  background:var(--card);font-size:.8rem;font-weight:800;cursor:pointer;
  transition:all .18s cubic-bezier(.34,1.2,.64,1);flex:1;text-align:center;
  box-shadow:var(--shadow-sm);color:var(--text);
}
.diff-pill:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.diff-pill.selected{color:#fff;border-color:transparent;transform:translateY(-2px);}
.diff-pill .pieces{font-size:.64rem;opacity:.8;display:block;margin-top:3px;font-weight:600;}

/* ── Artwork picker ── */
.artwork-section{display:none;}
.artwork-section.visible{
  animation:fadeSlideIn .25s ease forwards;
}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.artwork-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:10px;margin-bottom:4px;
}
.artwork-card{
  border-radius:14px;border:2.5px solid var(--border);cursor:pointer;
  overflow:hidden;transition:all .2s cubic-bezier(.34,1.2,.64,1);
  background:#f8fafc;box-shadow:var(--shadow-sm);
}
.artwork-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.artwork-card:active{transform:scale(.95);}
.artwork-card.selected{
  border-color:var(--purple-m);
  box-shadow:0 0 0 3px rgba(124,58,237,.2),var(--shadow);
  transform:translateY(-2px);
}
.artwork-thumb-img{
  width:100%;aspect-ratio:1;background-size:cover;background-position:center;
  transition:transform .3s ease;
}
.artwork-card:hover .artwork-thumb-img{transform:scale(1.05);}
.artwork-card-label{
  font-size:.6rem;font-weight:700;text-align:center;padding:5px 4px 6px;
  color:var(--muted);line-height:1.2;background:var(--card);
}
.artwork-card.selected .artwork-card-label{color:var(--purple-m);}

/* ── Start button ── */
.start-btn{
  width:100%;padding:17px;border:none;border-radius:16px;
  background:linear-gradient(135deg,#4C1D95,#7C3AED,#8B5CF6);
  background-size:200% 100%;background-position:100% 0;
  color:#fff;font-size:1rem;font-weight:800;cursor:pointer;margin-top:8px;
  box-shadow:0 8px 24px rgba(109,40,217,.45),0 2px 6px rgba(0,0,0,.1);
  transition:transform .15s,box-shadow .15s,background-position .4s;
  letter-spacing:.1px;
}
.start-btn:hover:not(:disabled){
  background-position:0 0;
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(109,40,217,.5),0 4px 8px rgba(0,0,0,.12);
}
.start-btn:active:not(:disabled){transform:scale(.97);}
.start-btn:disabled{opacity:.35;pointer-events:none;filter:grayscale(.3);}

/* ── Puzzle screen ── */
#screen-puzzle{background:#FAFAFA;}
.puzzle-meta{
  display:flex;align-items:stretch;
  background:var(--card);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.meta-stat{
  flex:1;text-align:center;padding:10px 6px;position:relative;
}
.meta-stat+.meta-stat::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:1px;background:var(--border);
}
.meta-val{font-size:1.15rem;font-weight:900;color:var(--purple-m);letter-spacing:-.3px;}
.meta-lbl{font-size:.58rem;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;margin-top:2px;}

.puzzle-wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:12px;gap:10px;
}

/* ── Board ── */
#board{
  display:grid;
  box-shadow:0 12px 40px rgba(0,0,0,.2),0 4px 10px rgba(0,0,0,.1);
  border-radius:12px;overflow:hidden;
  border:3px solid #1E293B;cursor:pointer;
  touch-action:none;
  transition:opacity .35s ease;
}
.tile{
  background-repeat:no-repeat;position:relative;
  transition:box-shadow .12s,transform .12s;
}
.tile.selected{
  box-shadow:inset 0 0 0 3px #FBBF24,inset 0 0 0 6px rgba(0,0,0,.25);
  z-index:1;
}
.tile.hint-tile{opacity:.4;}
.tile-num{
  position:absolute;bottom:3px;right:3px;
  font-size:clamp(7px,1.3vw,11px);font-weight:900;color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.9);
  background:rgba(0,0,0,.5);
  padding:1px 4px;border-radius:4px;
  pointer-events:none;line-height:1.3;
  backdrop-filter:blur(2px);
}

/* ── Fact ticker ── */
.fact-bar{
  background:linear-gradient(135deg,#F5F3FF,#EDE9FE);
  border:1.5px solid #C4B5FD;border-radius:14px;
  padding:12px 16px;width:100%;max-width:460px;
  box-shadow:var(--shadow-sm);
}
.fact-text{font-size:.8rem;font-weight:600;color:#3B0764;line-height:1.6;}

/* ── Preview thumbnail ── */
.preview-wrap{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border-radius:14px;padding:10px 14px;
  border:1.5px solid var(--border);
  box-shadow:var(--shadow-sm);width:100%;max-width:460px;
}
.preview-img{width:52px;height:52px;border-radius:10px;overflow:hidden;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.15);}
.preview-img div{width:100%;height:100%;background-repeat:no-repeat;}
.preview-info{font-size:.74rem;color:var(--muted);font-weight:600;line-height:1.4;flex:1;}
.preview-info strong{display:block;color:var(--text);font-size:.84rem;margin-bottom:3px;font-weight:800;}

/* ── Puzzle hint button ── */
.hint-btn{
  border:none;background:rgba(255,255,255,.2);color:rgba(255,255,255,.9);
  border-radius:10px;padding:8px 12px;font-size:.76rem;font-weight:700;cursor:pointer;
  transition:background .15s;backdrop-filter:blur(4px);letter-spacing:.1px;
}
.hint-btn:hover{background:rgba(255,255,255,.3);}
.hint-btn.on{background:rgba(250,204,21,.25);color:#FDE68A;}

/* ── Complete screen ── */
#screen-complete{
  background:linear-gradient(160deg,#F5F3FF,#EDE9FE,#FDF2F8);
  align-items:center;justify-content:center;text-align:center;padding:24px;
}
.complete-box{
  background:var(--card);border-radius:28px;padding:36px 24px;
  box-shadow:0 24px 64px rgba(109,40,217,.22),0 4px 16px rgba(0,0,0,.08);
  max-width:380px;width:100%;
  animation:popIn .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.7) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.complete-emoji{font-size:4.5rem;margin-bottom:12px;
  animation:bounce .6s ease infinite alternate;}
@keyframes bounce{from{transform:scale(1) rotate(-3deg)}to{transform:scale(1.15) rotate(3deg)}}
.complete-title{font-size:1.85rem;font-weight:900;margin-bottom:6px;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--purple),var(--purple-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.complete-sub{font-size:.88rem;color:var(--muted);margin-bottom:22px;font-weight:500;}
.complete-stats{display:flex;gap:10px;justify-content:center;margin-bottom:22px;}
.cstat{
  background:linear-gradient(135deg,#F8F7FF,#EDE9FE);
  border:1.5px solid #DDD6FE;border-radius:16px;padding:14px 16px;flex:1;
}
.cstat-val{font-size:1.5rem;font-weight:900;color:var(--purple-m);}
.cstat-lbl{font-size:.62rem;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;margin-top:2px;}
.facts-section{text-align:left;margin-bottom:22px;}
.facts-title{font-size:.7rem;font-weight:900;color:var(--muted);text-transform:uppercase;
  letter-spacing:2px;margin-bottom:10px;}
.fact-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px;
  font-size:.81rem;line-height:1.5;color:var(--text);}
.fact-item::before{content:'✦';color:var(--purple-m);font-size:.7rem;flex-shrink:0;margin-top:3px;}
.complete-btns{display:flex;gap:10px;}
.cbtn{flex:1;padding:14px;border:none;border-radius:14px;font-size:.9rem;font-weight:800;
  cursor:pointer;transition:transform .12s,box-shadow .12s;letter-spacing:.1px;}
.cbtn:active{transform:scale(.96);}
.cbtn-again{
  background:linear-gradient(135deg,#4C1D95,#7C3AED);color:#fff;
  box-shadow:0 6px 20px rgba(109,40,217,.4);
}
.cbtn-again:hover{box-shadow:0 8px 24px rgba(109,40,217,.5);transform:translateY(-1px);}
.cbtn-home{background:#F1F5F9;color:var(--text);border:1.5px solid var(--border);}
.cbtn-home:hover{background:#E2E8F0;}

/* ── Confetti ── */
.confetti-piece{position:fixed;pointer-events:none;z-index:999;border-radius:2px;
  animation:fall linear forwards;}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

@media(min-width:600px){
  .scroll{max-width:520px;margin:0 auto;}
  .puzzle-wrap{max-width:520px;margin:0 auto;width:100%;}
}
</style>
</head>
<body>

<!-- ── SCREEN: Theme & Difficulty Selection ── -->
<div class="screen active" id="screen-home">
  <div class="top-bar">
    <div class="top-bar-title">🧩 Picture Puzzles</div>
    <div class="top-bar-sub">Learn while you play!</div>
  </div>
  <div class="scroll">
    <div class="hero">
      <h1>Picture Puzzles</h1>
      <p>Assemble stunning images &amp; discover amazing facts along the way</p>
    </div>

    <div class="section-label">Choose a Theme</div>
    <div class="theme-grid" id="theme-grid"></div>

    <div class="section-label">Difficulty</div>
    <div class="diff-row" id="diff-row"></div>

    <div class="artwork-section" id="artwork-section">
      <div class="section-label">Choose Artwork</div>
      <div class="artwork-grid" id="artwork-grid"></div>
    </div>

    <div style="height:12px"></div>
    <button class="start-btn" id="start-btn" onclick="startPuzzle()">Start Puzzle  →</button>
    <div style="height:28px"></div>
  </div>
</div>

<!-- ── SCREEN: Puzzle ── -->
<div class="screen" id="screen-puzzle">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="top-bar-title" id="puzzle-title"></div>
    <button class="hint-btn" id="num-btn"  onclick="toggleNumbers()">💡 Hint</button>
    <button class="hint-btn" id="hint-btn" onclick="toggleHint()">👁 Peek</button>
  </div>
  <div class="puzzle-meta">
    <div class="meta-stat">
      <div class="meta-val" id="stat-time">0:00</div>
      <div class="meta-lbl">Time</div>
    </div>
    <div class="meta-stat">
      <div class="meta-val" id="stat-moves">0</div>
      <div class="meta-lbl">Swaps</div>
    </div>
    <div class="meta-stat">
      <div class="meta-val" id="stat-left">–</div>
      <div class="meta-lbl">Left</div>
    </div>
  </div>
  <div class="puzzle-wrap">
    <div class="preview-wrap">
      <div class="preview-img"><div id="preview-thumb"></div></div>
      <div class="preview-info">
        <strong id="preview-name"></strong>
        <span id="preview-hint-text">Tap 👁 Peek to reveal image<br>Tap 2 tiles to swap them!</span>
      </div>
    </div>
    <div id="board"></div>
    <div class="fact-bar">
      <div class="fact-text" id="fact-display"></div>
    </div>
  </div>
</div>

<!-- ── SCREEN: Complete ── -->
<div class="screen" id="screen-complete">
  <div class="complete-box">
    <div class="complete-emoji" id="c-emoji">🎉</div>
    <div class="complete-title">Puzzle Solved!</div>
    <div class="complete-sub" id="c-sub"></div>
    <div class="complete-stats">
      <div class="cstat">
        <div class="cstat-val" id="c-time">–</div>
        <div class="cstat-lbl">Time</div>
      </div>
      <div class="cstat">
        <div class="cstat-val" id="c-moves">–</div>
        <div class="cstat-lbl">Swaps</div>
      </div>
    </div>
    <div class="facts-section">
      <div class="facts-title" id="c-facts-title">Did You Know?</div>
      <div id="c-facts-list"></div>
    </div>
    <div class="complete-btns">
      <button class="cbtn cbtn-home" onclick="goHome()">🏠 Home</button>
      <button class="cbtn cbtn-again" onclick="startPuzzle()">▶ Play Again</button>
    </div>
  </div>
</div>

<script>
// ── Theme Definitions ──────────────────────────────────────────────────────────

const THEMES = [
  {
    id: 'solar',
    name: 'Solar System',
    emoji: '🚀',
    gradient: 'linear-gradient(135deg,#0a0a2e,#1a1a5e)',
    facts: [
      '🌟 The Sun is so enormous that 1,300,000 Earths could fit inside it — and yet it\'s considered just an average-sized star!',
      '🌡️ Venus is hotter than Mercury even though it\'s further from the Sun — its thick atmosphere traps heat like a greenhouse.',
      '🌪️ Jupiter\'s Great Red Spot is a storm that has been raging for over 350 years — and it\'s wider than planet Earth!',
      '💍 Saturn\'s rings are incredibly thin — just 10 metres deep in places, yet they stretch 280,000 km wide. That\'s like slicing paper-thin!',
      '🚂 If you drove a car to the Sun at motorway speed, the journey would take about 170 years!',
      '🏔️ Olympus Mons on Mars is nearly 3 times taller than Mount Everest — the biggest volcano in the entire solar system!',
      '🔇 Space is completely silent — with no air, there\'s nothing to carry sound waves. Explosions in space make zero noise!',
      '🌊 Neptune takes 165 Earth-years to orbit the Sun once. It has only completed one full lap since it was discovered in 1846!',
      '👣 The footprints left on the Moon by Apollo astronauts will last for millions of years — there\'s no wind or rain to erase them.',
      '💡 Light from the Sun takes just 8 minutes to reach Earth — but 4 years to reach the very next closest star!',
      '🌙 The Moon is slowly drifting away from Earth at 3.8 cm per year — the same speed your fingernails grow!',
      '🪐 Pluto is so small that the width of Russia on Earth is actually larger than Pluto\'s entire diameter!'
    ],
    svgs: [buildSolarSVG(), buildMoonSVG(), buildMarsSVG()]
  },
  {
    id: 'ocean',
    name: 'Ocean Life',
    emoji: '🌊',
    gradient: 'linear-gradient(135deg,#0369a1,#0ea5e9)',
    facts: [
      '🌊 We\'ve explored less than 20% of Earth\'s oceans — the deep sea is more mysterious than outer space!',
      '💙 A blue whale\'s heart is the size of a small car and beats only 8 times per minute. Its arteries are wide enough to swim through!',
      '🐙 Octopuses have three hearts, blue blood, and nine brains — one central brain and one in each arm!',
      '🦈 Sharks have no bones at all — their entire skeleton is made of cartilage, the same bendy stuff in your ears and nose!',
      '🤝 Sea otters hold hands while sleeping so they don\'t drift apart. This cute group is called a "raft"!',
      '🐠 Clownfish (like Nemo!) can change from male to female. If the female in a group disappears, the male becomes female!',
      '🦐 The mantis shrimp punches with the force of a bullet and can see 16 types of colour — humans can only see 3!',
      '🪸 Coral reefs cover less than 1% of the ocean floor but are home to over 25% of all marine species — the rainforests of the sea!',
      '🐬 Dolphins give each other names! Each dolphin has a unique whistle it uses to introduce itself to others.',
      '🌋 The Mariana Trench is so deep you could stack 29 Eiffel Towers on top of each other and still not reach the surface!',
      '🐠 Some jellyfish are biologically immortal — when they age or get sick they can transform back into a baby and start life over!',
      '🐢 Sea turtles have existed for over 100 million years — they were swimming around when dinosaurs still roamed the Earth!'
    ],
    svgs: [buildOceanSVG(), buildCoralSVG(), buildDeepSeaSVG()]
  },
  {
    id: 'world',
    name: 'World Map',
    emoji: '🌍',
    gradient: 'linear-gradient(135deg,#065f46,#0d9488)',
    facts: [
      '🌍 Africa is so massive you could fit the USA, China, India, and all of Europe inside it and still have room to spare!',

// ── State ─────────────────────────────────────────────────────────────────────
let selectedTheme = null;
let selectedDiff  = null;
let selectedSvg   = null;
let tiles = [];           // tiles[i] = which image piece is at position i
let selectedTile  = -1;
let moves = 0;
let seconds = 0;
let timerInterval = null;
let factIndex = 0;
let factInterval = null;
let hintOn = false;
let numbersOn = false;
let currentSvg = null;
let boardSize = 320;
let boardH = 320;
const SVG_SIZE = 500;     // SVG logical dimensions (square)

// ── Build Selection UI ────────────────────────────────────────────────────────
function buildSelectionUI() {
  // Theme cards
  const tg = document.getElementById('theme-grid');
  tg.innerHTML = '';
  THEMES.forEach(t => {
    const c = document.createElement('div');
    c.className = 'theme-card' + (selectedTheme === t.id ? ' selected' : '');
    c.innerHTML = `
      <div class="theme-bg" style="background:${t.gradient}"></div>
      <div class="theme-emoji">${t.emoji}</div>
      <div class="theme-label">${t.name}</div>
      <div class="theme-check">✓</div>`;
    c.onclick = () => {
      if (selectedTheme !== t.id) { selectedTheme = t.id; selectedSvg = null; }
      buildSelectionUI();
    };
    tg.appendChild(c);
  });

  // Difficulty pills
  const dr = document.getElementById('diff-row');
  dr.innerHTML = '';
  DIFFICULTIES.forEach(d => {
    const p = document.createElement('button');
    const active = selectedDiff === d.label;
    p.className = 'diff-pill' + (active ? ' selected' : '');
    p.innerHTML = `${d.label}<span class="pieces">${d.pieces}</span>`;
    if (active) {
      p.style.background = d.color;
      p.style.boxShadow = `0 4px 14px ${d.shadow}`;
    }
    p.onclick = () => { selectedDiff = d.label; buildSelectionUI(); };
    dr.appendChild(p);
  });

  // Artwork picker — shown for themes with real photo images or multiple artwork options
  const theme = THEMES.find(t => t.id === selectedTheme);
  const artSection = document.getElementById('artwork-section');
  const artGrid    = document.getElementById('artwork-grid');
  const isImageUrl = (s) => typeof s === 'string' && (s.startsWith('http') || s.startsWith('data:image/') || /\.(jpe?g|png|webp|gif)$/i.test(s.trim()));
  const hasPhotos  = theme && (theme.svgs.length > 1 || theme.svgs.some(isImageUrl));

  if (hasPhotos) {
    artSection.style.display = 'block';
    artSection.classList.add('visible');
    artGrid.innerHTML = '';
    theme.svgs.forEach((src, i) => {
      const card = document.createElement('div');
      card.className = 'artwork-card' + (selectedSvg === src ? ' selected' : '');
      const label = (theme.svgLabels && theme.svgLabels[i]) || `Option ${i + 1}`;
      const thumbUrl = svgToDataUrl(src);
      card.innerHTML = `
        <div class="artwork-thumb-img" style="background-image:url('${thumbUrl}')"></div>
        <div class="artwork-card-label">${label.replace(/\n/g, '<br>')}</div>`;
      card.onclick = () => { selectedSvg = src; buildSelectionUI(); };
      artGrid.appendChild(card);
    });
  } else {
    artSection.style.display = 'none';
    artGrid.innerHTML = '';
    // Auto-select random for SVG themes
    if (theme && !selectedSvg) selectedSvg = theme.svgs[Math.floor(Math.random() * theme.svgs.length)];
  }

  const needsArt = hasPhotos;
  document.getElementById('start-btn').disabled = !selectedTheme || !selectedDiff || (needsArt && !selectedSvg);
}

// ── Start Puzzle ──────────────────────────────────────────────────────────────
function startPuzzle() {
  const theme = THEMES.find(t => t.id === selectedTheme);
  const diff  = DIFFICULTIES.find(d => d.label === selectedDiff);
  if (!theme || !diff) return;

  // Compute board size based on viewport — generous for kids
  const maxW = Math.min(Math.floor(window.innerWidth * 0.92), 560);
  const maxH = Math.floor((window.innerHeight - 220) * 0.82); // leave room for bars/preview/facts
  boardSize = Math.min(maxW, maxH);
  boardH = boardSize; // default square; updated after image load

  // Build and scramble tiles
  const n = diff.grid * diff.grid;
  tiles = Array.from({length: n}, (_, i) => i);
  shuffle(tiles);
  // Ensure not already solved
  while (isSolved()) shuffle(tiles);

  moves = 0;
  seconds = 0;
  selectedTile = -1;
  hintOn = false;
  numbersOn = false;
  factIndex = 0;

  // Use the user-selected artwork (or random for SVG themes)
  currentSvg = selectedSvg || theme.svgs[Math.floor(Math.random() * theme.svgs.length)];

  // Preload image to detect aspect ratio, then render
  const doRender = () => {
    renderBoard(theme, diff.grid);
    document.getElementById('board').style.opacity = '1';
  };
  document.getElementById('board').style.opacity = '0';
  const preloadImg = new Image();
  preloadImg.onload = () => {
    if (preloadImg.naturalWidth && preloadImg.naturalHeight) {
      const ar = preloadImg.naturalWidth / preloadImg.naturalHeight;
      boardH = Math.round(boardSize / ar);
    }
    doRender();
  };
  preloadImg.onerror = doRender;
  preloadImg.src = currentSvg;

  // Reset hint button states
  document.getElementById('hint-btn').classList.remove('on');
  document.getElementById('num-btn').classList.remove('on');

  // Update meta
  document.getElementById('puzzle-title').textContent = `${theme.emoji} ${theme.name}`;
  document.getElementById('stat-moves').textContent = '0';
  document.getElementById('stat-time').textContent = '0:00';
  updateLeft(diff.grid);

  // Preview thumbnail
  const dataUrl = svgToDataUrl(currentSvg);
  const thumb = document.getElementById('preview-thumb');
  thumb.style.backgroundImage = `url('${dataUrl}')`;
  thumb.style.backgroundSize = '56px 56px';
  document.getElementById('preview-name').textContent = theme.name;

  // Hints (facts)
  clearInterval(factInterval);
  showFact(theme);
  factInterval = setInterval(() => { factIndex = (factIndex + 1) % theme.facts.length; showFact(theme); }, 8000);

  // Timer
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById('stat-time').textContent = fmtTime(seconds);
  }, 1000);

  showScreen('screen-puzzle');
}

function svgToDataUrl(src) {
  // Real image URL or relative path — pass through directly
  if (src.startsWith('http') || src.startsWith('data:image/')) return src;
  if (!src.trim().startsWith('<')) return src; // relative path to .jpg/.png etc.
  return 'data:image/svg+xml,' + encodeURIComponent(src);
}

function renderBoard(theme, grid) {
  const board = document.getElementById('board');
  const tileW = Math.floor(boardSize / grid);
  const tileH = Math.floor(boardH / grid);
  const actualW = tileW * grid;
  const actualH = tileH * grid;

  board.style.gridTemplateColumns = `repeat(${grid}, ${tileW}px)`;
  board.style.width  = actualW + 'px';
  board.style.height = actualH + 'px';
  board.innerHTML = '';

  const dataUrl = svgToDataUrl(currentSvg);
  const bgSize  = `${actualW}px ${actualH}px`;

  tiles.forEach((piece, pos) => {
    const col = piece % grid;
    const row = Math.floor(piece / grid);
    const bx  = -(col * tileW);
    const by  = -(row * tileH);

    const tile = document.createElement('div');
    tile.className = 'tile' + (pos === selectedTile ? ' selected' : '');
    tile.dataset.pos = pos;
    tile.style.cssText = `
      width:${tileW}px; height:${tileH}px;
      background-image:url('${dataUrl}');
      background-size:${bgSize};
      background-position:${bx}px ${by}px;
      outline:1px solid rgba(0,0,0,0.12);
    `;
    tile.addEventListener('click', () => handleTileClick(pos));
    if (numbersOn) {
      const lbl = document.createElement('div');
      lbl.className = 'tile-num';
      lbl.textContent = piece + 1;   // which piece this is (1-based target position)
      tile.appendChild(lbl);
    }
    board.appendChild(tile);
  });
}

function handleTileClick(pos) {
  const diff  = DIFFICULTIES.find(d => d.label === selectedDiff);
  const theme = THEMES.find(t => t.id === selectedTheme);
  if (!diff || !theme) return;

  if (selectedTile === -1) {
    selectedTile = pos;
    refreshTileHighlights(diff.grid);
    return;
  }
  if (selectedTile === pos) {
    selectedTile = -1;
    refreshTileHighlights(diff.grid);
    return;
  }
  // Swap
  [tiles[selectedTile], tiles[pos]] = [tiles[pos], tiles[selectedTile]];
  moves++;
  document.getElementById('stat-moves').textContent = moves;
  selectedTile = -1;
  renderBoard(theme, diff.grid);
  updateLeft(diff.grid);

  if (isSolved()) completePuzzle(theme);
}

function refreshTileHighlights(grid) {
  document.querySelectorAll('.tile').forEach((el, i) => {
    el.classList.toggle('selected', i === selectedTile);
  });
}

function updateLeft(grid) {
  let wrong = 0;
  tiles.forEach((piece, pos) => { if (piece !== pos) wrong++; });
  document.getElementById('stat-left').textContent = wrong;
}

function isSolved() {
  return tiles.every((piece, pos) => piece === pos);
}

// ── Numbers hint ──────────────────────────────────────────────────────────────
function toggleNumbers() {
  // Turn off peek mode if it's on
  if (hintOn) { toggleHint(); return; }

  numbersOn = !numbersOn;
  document.getElementById('num-btn').classList.toggle('on', numbersOn);
  const diff  = DIFFICULTIES.find(d => d.label === selectedDiff);
  const theme = THEMES.find(t => t.id === selectedTheme);
  if (!diff || !theme) return;
  renderBoard(theme, diff.grid);
}

// ── Peek ──────────────────────────────────────────────────────────────────────
function toggleHint() {
  // Turn off numbers mode if on
  if (numbersOn) {
    numbersOn = false;
    document.getElementById('num-btn').classList.remove('on');
  }
  hintOn = !hintOn;
  document.getElementById('hint-btn').classList.toggle('on', hintOn);
  const board = document.getElementById('board');
  const diff  = DIFFICULTIES.find(d => d.label === selectedDiff);
  const theme = THEMES.find(t => t.id === selectedTheme);
  if (!diff || !theme) return;

  const grid = diff.grid;
  const tileW = Math.floor(boardSize / grid);
  const tileH = Math.floor(boardH / grid);
  const actualW = tileW * grid;
  const actualH = tileH * grid;

  if (hintOn) {
    // Show the full solved image
    board.innerHTML = '';
    const img = document.createElement('div');
    img.style.cssText = `
      width:${actualW}px; height:${actualH}px;
      background-image:url('${svgToDataUrl(currentSvg)}');
      background-size:${actualW}px ${actualH}px;
      background-repeat:no-repeat;
      cursor:pointer;
    `;
    img.addEventListener('click', toggleHint);
    board.appendChild(img);
  } else {
    renderBoard(theme, grid);
  }
}

// ── Facts ─────────────────────────────────────────────────────────────────────
function showFact(theme) {
  const el = document.getElementById('fact-display');
  el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = theme.facts[factIndex % theme.facts.length];
    el.style.transition = 'opacity .5s';
    el.style.opacity = '1';
  }, 300);
}

// ── Complete ──────────────────────────────────────────────────────────────────
function completePuzzle(theme) {
  clearInterval(timerInterval);
  clearInterval(factInterval);

  // Show completion screen
  document.getElementById('c-emoji').textContent = theme.emoji;
  document.getElementById('c-sub').textContent = `You solved the ${theme.name} puzzle!`;
  document.getElementById('c-time').textContent = fmtTime(seconds);
  document.getElementById('c-moves').textContent = moves;
  document.getElementById('c-facts-title').textContent = `${theme.name} — Did You Know?`;

  const fl = document.getElementById('c-facts-list');
  fl.innerHTML = '';
  // Show 4 random facts
  const shuffled = [...theme.facts].sort(() => Math.random() - .5).slice(0, 4);
  shuffled.forEach(f => {
    const d = document.createElement('div');
    d.className = 'fact-item';
    d.textContent = f;
    fl.appendChild(d);
  });

  setTimeout(() => showScreen('screen-complete'), 400);
  launchConfetti();
}

// ── Confetti ──────────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#6D28D9','#EC4899','#F97316','#10B981','#FBBF24','#3B82F6'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw; top:-20px;
      width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.8}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goHome() {
  clearInterval(timerInterval);
  clearInterval(factInterval);
  selectedSvg = null;
  buildSelectionUI();
  showScreen('screen-home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
selectedTheme = THEMES[0].id;
selectedDiff  = DIFFICULTIES[0].label;
buildSelectionUI();
