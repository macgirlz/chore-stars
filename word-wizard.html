<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harper's Word Wizard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(160deg, #ffecd2, #fcb69f, #a1c4fd);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 8px;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 8px; }
    h1 {
      font-size: 1.9rem;
      color: #fff;
      text-shadow: 3px 3px 0 #e05fa0, 6px 6px 0 rgba(0,0,0,0.1);
    }
    .stars-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: 4px; font-size: 1rem; color: #fff; font-weight: bold;
    }
    .mute-btn {
      background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50%; width: 32px; height: 32px; font-size: 0.95rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .mute-btn:hover { background: rgba(255,255,255,0.5); }

    /* ── Card ── */
    .card {
      background: white; border-radius: 24px; padding: 14px 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.18);
      width: min(98vw, 520px); text-align: center;
    }

    /* ── Grade selector ── */
    .section-label {
      font-size: 0.7rem; font-weight: bold; color: #aaa;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
    }
    .grade-tabs {
      display: flex; gap: 4px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 8px;
    }
    .grade-tab {
      padding: 4px 10px; border: 2px solid transparent; border-radius: 20px;
      font-family: inherit; font-size: 0.75rem; font-weight: bold;
      cursor: pointer; transition: all 0.15s; background: #f0f0f0; color: #555;
    }
    .grade-tab.active { border-color: #6c5ce7; background: #ede7ff; color: #6c5ce7; transform: scale(1.08); }
    .grade-tab[data-grade="2"] { background: #b5ead7; color: #2d3436; }
    .grade-tab[data-grade="3"] { background: #c7f2a4; color: #2d3436; }
    .grade-tab[data-grade="4"] { background: #ffdac1; color: #2d3436; }
    .grade-tab[data-grade="5"] { background: #c7ceea; color: #2d3436; }
    .grade-tab[data-grade="6"] { background: #ffb7b2; color: #2d3436; }

    /* ── Category tabs ── */
    .cat-tabs {
      display: flex; gap: 4px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 10px;
    }
    .cat-tab {
      padding: 3px 9px; border: 2px solid transparent; border-radius: 20px;
      font-family: inherit; font-size: 0.72rem; font-weight: bold;
      cursor: pointer; transition: all 0.15s;
    }
    .cat-tab.active        { border-color: #6c5ce7; transform: scale(1.08); }
    .cat-tab[data-cat="all"]      { background: #dfe6e9; color: #2d3436; }
    .cat-tab[data-cat="animals"]  { background: #b5ead7; color: #2d3436; }
    .cat-tab[data-cat="food"]     { background: #ffdac1; color: #2d3436; }
    .cat-tab[data-cat="nature"]   { background: #c7ceea; color: #2d3436; }
    .cat-tab[data-cat="things"]   { background: #ffb7b2; color: #2d3436; }
    .cat-tab[data-cat="science"]  { background: #caffbf; color: #2d3436; }
    .cat-tab[data-cat="social"]   { background: #ffc6ff; color: #2d3436; }
    .cat-tab[data-cat="language"] { background: #fdffb6; color: #2d3436; }

    /* Progress */
    .progress-wrap { background: #eee; border-radius: 10px; height: 7px; margin-bottom: 10px; overflow: hidden; }
    #progress-bar  { height: 100%; background: linear-gradient(90deg,#a29bfe,#fd79a8); border-radius: 10px; transition: width .5s; }

    /* ── Game row ── */
    .game-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 8px;
    }
    .emoji-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }

    #category {
      display: inline-block; background: #a1c4fd; color: #2c3e50;
      font-size: 0.72rem; font-weight: bold; padding: 2px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 1px;
    }
    #grade-badge {
      display: inline-block; background: #6c5ce7; color: white;
      font-size: 0.68rem; font-weight: bold; padding: 2px 8px;
      border-radius: 20px;
    }
    #emoji {
      font-size: clamp(56px, 14vw, 85px); line-height: 1;
      filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.15));
      animation: bounce 2s infinite;
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

    .say-btn {
      background: #fdcb6e; border: none; border-radius: 50px;
      padding: 5px 12px; font-family: inherit; font-size: 0.82rem;
      font-weight: bold; color: #2d3436; cursor: pointer;
      box-shadow: 0 3px 0 rgba(0,0,0,0.15);
      transition: transform .1s, box-shadow .1s;
      display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .say-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }
    .say-btn.speaking { background: #a29bfe; color: white; animation: pulse .6s infinite alternate; }
    @keyframes pulse { from{opacity:1} to{opacity:0.6} }

    /* ── Hangman ── */
    #hangman-svg { width: clamp(120px,32vw,170px); height: clamp(120px,32vw,170px); }

    /* Wrong badges */
    #wrong-badges { display: flex; justify-content: center; gap: 4px; margin-bottom: 7px; }
    .badge {
      width: 20px; height: 20px; border-radius: 50%; background: #eee;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: bold; color: #aaa; border: 2px solid #ddd; transition: all .2s;
    }
    .badge.wrong { background: #ff7675; color: white; border-color: #d63031; }

    /* ── Word slots ── */
    #answer-slots {
      display: flex; justify-content: center; gap: 5px;
      flex-wrap: wrap; margin-bottom: 8px; min-height: 48px;
    }
    .slot {
      width: clamp(30px,8vw,46px); height: clamp(30px,8vw,46px);
      border-bottom: 4px solid #ccc; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(15px,4.5vw,23px); font-weight: bold;
      color: #2c3e50; background: #f8f9fa; transition: all .2s;
    }
    .slot.revealed      { border-color:#00b894; background:#e8fff8; color:#00b894; animation: popLetter .3s ease; }
    .slot.reveal-answer { border-color:#e17055; background:#fff0ee; color:#e17055; }
    @keyframes popLetter { 0%{transform:scale(.5)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }

    /* Hint */
    #hint-text { font-size: 0.9rem; color: #888; margin-bottom: 7px; min-height: 18px; }

    /* ── Keyboard ── */
    #keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 10px; }
    .key {
      width: clamp(28px,7.5vw,38px); height: clamp(28px,7.5vw,38px);
      border-radius: 7px; border: none; font-family: inherit;
      font-size: clamp(12px,3.2vw,16px); font-weight: bold; color: white;
      cursor: pointer; background: #6c5ce7; box-shadow: 0 3px 0 rgba(0,0,0,0.25);
      transition: transform .1s, box-shadow .1s, background .15s; user-select: none;
    }
    .key:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.25); }
    .key:disabled { cursor: default; }
    .key.correct { background: #00b894; box-shadow: 0 3px 0 #009975; }
    .key.wrong   { background: #b2bec3; box-shadow: 0 3px 0 #8a9aa0; opacity: .5; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 7px; justify-content: center; }
    .btn {
      padding: 9px 16px; font-size: 0.9rem; font-family: inherit; font-weight: bold;
      border: none; border-radius: 13px; cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: transform .1s, box-shadow .1s;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
    .btn-hint { background: #fdcb6e; color: #2d3436; }
    .btn-next { background: #6c5ce7; color: white; display: none; }
    .btn-skip { background: #b2bec3; color: white; }

    /* ── Feedback ── */
    #feedback { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; z-index:100; }
    .confetti-piece { position:fixed; border-radius:2px; animation:fall linear forwards; pointer-events:none; }
    @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
    #well-done { font-size:clamp(2rem,10vw,3.5rem); font-weight:bold; color:#6c5ce7; text-shadow:3px 3px 0 #ffb347; opacity:0; pointer-events:none; }
    @keyframes popIn { from{transform:scale(.3);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 60%{transform:translateX(5px)} }
  </style>
</head>
<body>

<div class="header">
  <h1>Harper's Word Wizard</h1>
  <div class="stars-bar">
    Stars: <span id="star-display">⭐</span> <span id="star-count">0</span>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()" title="Toggle sound">🔊</button>
  </div>
</div>

<div class="card">

  <!-- Grade selector -->
  <div class="section-label">Grade Level</div>
  <div class="grade-tabs">
    <button class="grade-tab active" data-grade="0"  onclick="setGrade(0)">All</button>
    <button class="grade-tab"        data-grade="2"  onclick="setGrade(2)">Grade 2</button>
    <button class="grade-tab"        data-grade="3"  onclick="setGrade(3)">Grade 3</button>
    <button class="grade-tab"        data-grade="4"  onclick="setGrade(4)">Grade 4</button>
    <button class="grade-tab"        data-grade="5"  onclick="setGrade(5)">Grade 5</button>
    <button class="grade-tab"        data-grade="6"  onclick="setGrade(6)">Grade 6</button>
  </div>

  <!-- Category selector -->

    <button class="cat-tab"        data-cat="food"     onclick="pickCategory('food')">Food</button>
    <button class="cat-tab"        data-cat="nature"   onclick="pickCategory('nature')">Nature</button>
    <button class="cat-tab"        data-cat="things"   onclick="pickCategory('things')">Things</button>
    <button class="cat-tab"        data-cat="science"  onclick="pickCategory('science')">Science</button>
    <button class="cat-tab"        data-cat="social"   onclick="pickCategory('social')">Social</button>
    <button class="cat-tab"        data-cat="language" onclick="pickCategory('language')">Language</button>
  </div>

  <div class="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>

  <!-- Emoji + Hangman -->
  <div class="game-row">
    <div class="emoji-col">
      <span id="grade-badge">Grade 2</span>
      <span id="category">ANIMALS</span>
      <div id="emoji">🐶</div>
      <button class="say-btn" id="say-btn" onclick="sayWord()">🔈 Say it</button>
    </div>

    <div>
      <svg id="hangman-svg" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg">
        <!-- Gallows — always visible -->
        <line x1="10"  y1="200" x2="80"  y2="200" stroke="#a29bfe" stroke-width="6" stroke-linecap="round"/>
        <line x1="40"  y1="200" x2="40"  y2="20"  stroke="#a29bfe" stroke-width="6" stroke-linecap="round"/>
        <line x1="40"  y1="20"  x2="140" y2="20"  stroke="#a29bfe" stroke-width="6" stroke-linecap="round"/>
        <line x1="140" y1="20"  x2="140" y2="50"  stroke="#74b9ff" stroke-width="4" stroke-linecap="round"/>
        <!-- Part 1: Head -->
        <g id="hm-head" display="none">
          <circle cx="140" cy="75" r="26" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="3"/>
          <g id="face-happy">
            <circle cx="131" cy="71" r="4" fill="#2d3436"/>
            <circle cx="149" cy="71" r="4" fill="#2d3436"/>
            <path d="M129 82 Q140 91 151 82" stroke="#e17055" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </g>
          <g id="face-sad" display="none">
            <path d="M127 69 L135 73" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M135 69 L127 73" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M145 69 L153 73" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M153 69 L145 73" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M129 88 Q140 81 151 88" stroke="#e17055" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </g>
        </g>
        <!-- Part 2: Body -->
        <line id="hm-body" x1="140" y1="101" x2="140" y2="155" stroke="#ff6b9d" stroke-width="5" stroke-linecap="round" display="none"/>
        <!-- Part 3: Left arm -->
        <line id="hm-larm" x1="140" y1="118" x2="108" y2="140" stroke="#ff9f43" stroke-width="5" stroke-linecap="round" display="none"/>
        <!-- Part 4: Right arm -->
        <line id="hm-rarm" x1="140" y1="118" x2="172" y2="140" stroke="#ff9f43" stroke-width="5" stroke-linecap="round" display="none"/>
        <!-- Part 5: Left leg -->
        <line id="hm-lleg" x1="140" y1="155" x2="112" y2="190" stroke="#0fbcf9" stroke-width="5" stroke-linecap="round" display="none"/>
        <!-- Part 6: Right leg -->
        <line id="hm-rleg" x1="140" y1="155" x2="168" y2="190" stroke="#0fbcf9" stroke-width="5" stroke-linecap="round" display="none"/>
      </svg>
    </div>
  </div>

  <div id="wrong-badges"></div>
  <div id="answer-slots"></div>
  <div id="hint-text"></div>
  <div id="keyboard"></div>

  <div class="btn-row">
    <button class="btn btn-hint" onclick="showHint()">Hint</button>
    <button class="btn btn-skip" onclick="nextWord()">Skip</button>
    <button class="btn btn-next" id="btn-next" onclick="nextWord()">Next Word!</button>
  </div>
</div>

<div id="feedback"><div id="well-done" style="display:none"></div></div>

const MAX_WRONG = 6;
const HM_PARTS  = ['hm-head','hm-body','hm-larm','hm-rarm','hm-lleg','hm-rleg'];
const GRADE_NAMES = {0:'All Grades',2:'Grade 2',3:'Grade 3',4:'Grade 4',5:'Grade 5',6:'Grade 6'};

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null, muted = false;
function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function toggleMute() { muted=!muted; document.getElementById('mute-btn').textContent=muted?'🔇':'🔊'; }
function playTone(f,type,dur,gain,t0,ctx){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.setValueAtTime(f,t0);g.gain.setValueAtTime(gain,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+dur);o.start(t0);o.stop(t0+dur);}
function playClick(){if(muted)return;const ctx=getCtx(),t=ctx.currentTime;playTone(660,'sine',.1,.3,t,ctx);}
function playWrong(){if(muted)return;const ctx=getCtx(),t=ctx.currentTime;[280,220,170].forEach((f,i)=>playTone(f,'sawtooth',.15,.15,t+i*.13,ctx));}
function playWin(){if(muted)return;const ctx=getCtx(),t=ctx.currentTime;[523,659,784,1047].forEach((f,i)=>playTone(f,'triangle',.25,.35,t+i*.13,ctx));}
function playHint(){if(muted)return;const ctx=getCtx(),t=ctx.currentTime;[880,1100].forEach((f,i)=>playTone(f,'sine',.2,.25,t+i*.15,ctx));}
function playLose(){if(muted)return;const ctx=getCtx(),t=ctx.currentTime;[300,250,200,160].forEach((f,i)=>playTone(f,'sawtooth',.2,.18,t+i*.15,ctx));}

// ── TTS ───────────────────────────────────────────────────────────────────────
window.speechSynthesis && window.speechSynthesis.getVoices();
function sayWord(){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const btn=document.getElementById('say-btn');
  btn.classList.add('speaking'); btn.textContent='🔈 Listening...';
  const u=new SpeechSynthesisUtterance(currentWord.word.toLowerCase());
  u.rate=0.75; u.pitch=1.1; u.lang='en-US';
  const v=window.speechSynthesis.getVoices();
  const pref=v.find(x=>x.lang==='en-US'&&x.localService)||v.find(x=>x.lang.startsWith('en'));
  if(pref) u.voice=pref;
  const reset=()=>{btn.classList.remove('speaking');btn.innerHTML='🔈 Say it';};
  u.onend=reset; u.onerror=reset;
  window.speechSynthesis.speak(u);
}

// ── State ─────────────────────────────────────────────────────────────────────
let currentWord=null, guessedLetters=new Set(), wrongGuesses=0;
let hintCount=0, stars=0, wordsPlayed=0;
let activeCat='all', activeGrade=0;
let pool=[], poolIndex=0, gameOver=false;

// ── Pool ──────────────────────────────────────────────────────────────────────
function buildPool(){
  let src=WORDS.filter(w=>
    (activeGrade===0 || w.grade===activeGrade) &&
    (activeCat==='all'  || w.cat===activeCat)
  );
  if(src.length===0) src=WORDS; // fallback if filter returns nothing
  pool=[...src].sort(()=>Math.random()-.5);
  poolIndex=0;
}

function setGrade(g){
  activeGrade=g;
  document.querySelectorAll('.grade-tab').forEach(t=>t.classList.toggle('active',+t.dataset.grade===g));
  buildPool(); nextWord(true);
}

function pickCategory(cat){
  activeCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===cat));
  buildPool(); nextWord(true);
}

// ── Game flow ─────────────────────────────────────────────────────────────────
function init(){ buildPool(); loadWord(); }

function nextWord(reset){
  if(reset) wordsPlayed=0;
  hintCount=0;
  document.getElementById('btn-next').style.display='none';
  loadWord();
}

function loadWord(){
  if(poolIndex>=pool.length) buildPool();
  currentWord=pool[poolIndex++];
  guessedLetters=new Set(); wrongGuesses=0; gameOver=false; hintCount=0;
  wordsPlayed++;
  updateProgress();
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('category').textContent=currentWord.cat.toUpperCase();
  document.getElementById('emoji').textContent=currentWord.emoji;
  document.getElementById('grade-badge').textContent=GRADE_NAMES[currentWord.grade]||'';
  document.getElementById('hint-text').textContent='';
  const sb=document.getElementById('say-btn');
  sb.classList.remove('speaking'); sb.innerHTML='🔈 Say it';
  renderHangman(); renderBadges(); renderSlots(); renderKeyboard();
  setTimeout(sayWord,600);
}

function renderHangman(){
  HM_PARTS.forEach(id=>document.getElementById(id).setAttribute('display','none'));
  document.getElementById('face-happy').setAttribute('display','inline');
  document.getElementById('face-sad').setAttribute('display','none');
}

function renderBadges(){
  const wrap=document.getElementById('wrong-badges'); wrap.innerHTML='';
  for(let i=0;i<MAX_WRONG;i++){
    const b=document.createElement('div');
    b.className='badge'+(i<wrongGuesses?' wrong':'');
    b.textContent=i<wrongGuesses?'✗':(i+1);
    wrap.appendChild(b);
  }
}

function renderSlots(){
  const c=document.getElementById('answer-slots'); c.innerHTML='';
  for(const letter of currentWord.word){
    const slot=document.createElement('div');
    const revealed=guessedLetters.has(letter);
    slot.className='slot'+(revealed?' revealed':'');
    slot.textContent=revealed?letter:'';
    c.appendChild(slot);
  }
}

function renderKeyboard(){
  const kb=document.getElementById('keyboard'); kb.innerHTML='';
  for(let i=0;i<26;i++){
    const letter=String.fromCharCode(65+i);
    const btn=document.createElement('button');
    btn.className='key'; btn.textContent=letter;
    const inWord=currentWord.word.includes(letter);
    const guessed=guessedLetters.has(letter);
    if(guessed){ btn.classList.add(inWord?'correct':'wrong'); btn.disabled=true; }
    btn.addEventListener('click',()=>guess(letter));
    kb.appendChild(btn);
  }
}

// ── Guess ─────────────────────────────────────────────────────────────────────
function guess(letter){
  if(gameOver||guessedLetters.has(letter)) return;
  guessedLetters.add(letter);
  const inWord=currentWord.word.includes(letter);
  if(inWord){
    playClick();
    const slots=document.querySelectorAll('.slot');
    currentWord.word.split('').forEach((l,i)=>{
      if(l===letter){
        slots[i].className='slot revealed'; slots[i].textContent=l;
        slots[i].style.animation='none'; void slots[i].offsetWidth;
        slots[i].style.animation='popLetter .3s ease';
      }
    });
  } else {
    wrongGuesses++;
    playWrong();
    const part=document.getElementById(HM_PARTS[wrongGuesses-1]);
    if(part){ part.setAttribute('display','inline');
      const svg=document.getElementById('hangman-svg');
      svg.style.animation='none'; void svg.offsetWidth; svg.style.animation='shake .3s ease';
    }
    renderBadges();
  }
  const keys=document.querySelectorAll('.key');
  keys.forEach(k=>{ if(k.textContent===letter){ k.classList.add(inWord?'correct':'wrong'); k.disabled=true; }});
  checkGameState();
}

function checkGameState(){
  const allRevealed=currentWord.word.split('').every(l=>guessedLetters.has(l));
  if(allRevealed){
    gameOver=true;
    document.getElementById('hint-text').textContent='Amazing! You got it! 🎉';
    document.getElementById('hint-text').style.color='#00b894';
    playWin(); earnStars(); showWellDone(); launchConfetti();
    document.getElementById('btn-next').style.display='inline-block';
    disableKeyboard();
  } else if(wrongGuesses>=MAX_WRONG){
    gameOver=true;
    document.getElementById('face-happy').setAttribute('display','none');
    document.getElementById('face-sad').setAttribute('display','inline');
    const slots=document.querySelectorAll('.slot');
    currentWord.word.split('').forEach((l,i)=>{
      if(!guessedLetters.has(l)){ slots[i].className='slot reveal-answer'; slots[i].textContent=l; }
    });
    document.getElementById('hint-text').textContent=`The word was: ${currentWord.word}`;
    document.getElementById('hint-text').style.color='#e17055';
    playLose();
    document.getElementById('btn-next').style.display='inline-block';
    disableKeyboard();
  }
}

function disableKeyboard(){ document.querySelectorAll('.key').forEach(k=>k.disabled=true); }

// ── Hint ──────────────────────────────────────────────────────────────────────
function showHint(){
  if(gameOver) return;
  hintCount++; playHint();
  if(hintCount===1){
    document.getElementById('hint-text').textContent=currentWord.hint;
    document.getElementById('hint-text').style.color='#888';
  } else {
    const unguessed=[...new Set(currentWord.word.split(''))].filter(l=>!guessedLetters.has(l));
    if(unguessed.length>0) guess(unguessed[Math.floor(Math.random()*unguessed.length)]);
  }
}

// ── Stars & Progress ──────────────────────────────────────────────────────────
function earnStars(){
  const earned=Math.max(1,3-Math.floor(wrongGuesses/2)-hintCount);
  stars+=earned;
  document.getElementById('star-count').textContent=stars;
  document.getElementById('star-display').textContent='⭐'.repeat(Math.min(earned,3));
}
function updateProgress(){
  document.getElementById('progress-bar').style.width=Math.min(100,(wordsPlayed/10)*100)+'%';
}

// ── Celebrations ──────────────────────────────────────────────────────────────
function showWellDone(){
  const msgs=['Well Done!','Amazing!','You Rock!','Brilliant!','Super Star!','Wonderful!','Fantastic!'];
  const el=document.getElementById('well-done');
  el.textContent=msgs[~~(Math.random()*msgs.length)];
  el.style.display='block'; el.style.animation='none';
  void el.offsetWidth; el.style.animation='popIn .4s cubic-bezier(.175,.885,.32,1.275) forwards';
  setTimeout(()=>{ el.style.display='none'; },1800);
}
function launchConfetti(){
  const colors=['#ff6b9d','#ffb347','#ffd32a','#0be881','#0fbcf9','#a29bfe','#f53b57'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[~~(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
    document.getElementById('feedback').appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

// ── Keyboard shortcut ─────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const l=e.key.toUpperCase();
  if(l.length===1&&l>='A'&&l<='Z') guess(l);
});

// ── Shake animation ───────────────────────────────────────────────────────────
const s=document.createElement('style');
s.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(5px)}}';
document.head.appendChild(s);

init();
</script>
